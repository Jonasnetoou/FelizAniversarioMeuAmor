<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Para Meu Grande Amor ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fff5f7 0%, #ffdde1 100%);
            color: #c9184a;
            font-family: 'Dancing Script', cursive;
            overflow-x: hidden;
            text-align: center;
        }

        /* Chuva de Pétalas e Corações */
        .floating-elements {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .hero {
            padding: 100px 20px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border-bottom: 3px dashed #ff85a1;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            margin: 0;
            color: #ff4d6d;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .frase-especial {
            font-size: 1.8rem;
            color: #800e13;
            margin-top: 15px;
            max-width: 800px;
            display: inline-block;
        }

        .galeria {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 50px 10px;
        }

        .moldura {
            background: white;
            padding: 12px;
            border-radius: 0px; /* Estilo Polaroid */
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.2);
            transform: rotate(-2deg);
            transition: 0.4s;
            max-width: 300px;
        }

        .moldura:nth-child(even) {
            transform: rotate(2deg);
        }

        .moldura:hover {
            transform: rotate(0deg) scale(1.1);
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.4);
        }

        .moldura img {
            width: 100%;
            border-radius: 5px;
        }

        footer {
            background: #ffb3c1;
            padding: 40px;
            color: #fff;
            font-size: 2.5rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="floating-elements" id="floating"></div>

    <section class="hero">
        <h1>Feliz Aniversário, Minha Vida! 🌹</h1>
        <p class="frase-especial">"Que a gente continue gigante diante de coisas que tentam nos fazer pequenos."</p>
    </section>

    <div class="galeria">
        <div class="moldura"><img src="1000122780.jpg"></div>
        <div class="moldura"><img src="1000122782.jpg"></div>
        <div class="moldura"><img src="1000122775.jpg"></div>
        <div class="moldura"><img src="1000122765.jpg"></div>
    </div>

    <footer>
        Te amo hoje, amanhã e sempre! ❤️
    </footer>

    <script>
        const container = document.getElementById('floating');
        const items = ['❤️', '🌸', '✨', '💖', '🌹'];
        
        function createItem() {
            const el = document.createElement('div');
            el.innerHTML = items[Math.floor(Math.random() * items.length)];
            el.style.position = 'absolute';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animation = `fall ${Math.random() * 3 + 3}s linear forwards`;
            el.style.fontSize = Math.random() * 25 + 15 + 'px';
            el.style.top = '-50px';
            container.appendChild(el);
            setTimeout(() => el.remove(), 6000);
        }

        const style = document.createElement('style');
        style.innerHTML = `@keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }`;
        document.head.appendChild(style);
        setInterval(createItem, 400);
    </script>
</body>
</html>
